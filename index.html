<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <!-- [สำคัญที่สุด] บรรทัดนี้คือเวทมนตร์ที่จะสั่ง Chrome ให้ขยายจอ 100% -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ระบบคิวเยี่ยมวันนี้-ห้องเยี่ยมนอก-เรือนจำกลางสุราษฎร์ธานี</title>
    <style>
        /* ล้างค่าขอบจอทั้งหมดให้เหลือ 0 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ซ่อนแถบเลื่อนของหน้าเว็บหลัก */
            background-color: #ECF7FB; /* สีพื้นหลังกลืนกับเว็บจริง */
        }
        
        /* สั่งให้ iframe ขยายเต็ม 100% ของจอมือถือเป๊ะๆ */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ทำฉากโหลด (Loader) สวยๆ คั่นเวลารอ Google Apps Script ทำงาน */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ECF7FB;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e0f3ff;
            border-top: 5px solid #2CC3F1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            font-family: sans-serif;
            color: #002240;
            font-weight: bold;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <!-- ฉากโหลด (จะหายไปเมื่อเว็บตัวจริงโหลดเสร็จ) -->
    <div id="loader-overlay">
        <div class="spinner"></div>
        <div class="loading-text">กำลังโหลดระบบคิวเยี่ยมวันนี้-ห้องเยี่ยมนอก...</div>
    </div>

    <!-- ฝังลิงก์ Google Apps Script ไว้ข้างในนี้ -->
    <iframe 
        id="appFrame"
        src="https://script.google.com/macros/s/AKfycbz8b3n3BxXYtVg51YHdXc9zD6oQfJbqGDIrra02eL-_cp4lPCF8yNrf8f0ez701CLh6oA/exec?page=board" 
        allow="camera; microphone"
        onload="hideLoader()">
    </iframe>

    <script>
        // ฟังก์ชันซ่อนฉากโหลดเมื่อเว็บใน iframe โหลดเสร็จสมบูรณ์
        function hideLoader() {
            const loader = document.getElementById('loader-overlay');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>
